# =============================================================================
# OpenWrt Auto Build — 全量 SDK 编译版
# 检测上游更新 → 全量源码编译（含 Nikki feeds）→ 发布 Release
# =============================================================================
name: openwrt-auto-build

on:
  schedule:
    - cron: '0 6 * * *'    # 每天 UTC 06:00 / 北京时间 14:00 检测
  workflow_dispatch:

permissions:
  contents: write
  actions: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  OWRT_REPO: openwrt/openwrt
  NIKKI_REPO: nikkinikki-org/OpenWrt-nikki
  LAST_VERSION_FILE: last_build_version
  BUILD_DIR: openwrt
  CCACHE_DIR: /tmp/.ccache
  MAKE_JOBS: 2                        # 固定并行度，匹配 GitHub Actions 免费 runner 2 核

jobs:
  # ─── Job 1: 检测上游 ─────────────────────────────────────────────────────
  check-upstream:
    runs-on: ubuntu-latest
    outputs:
      should_build: ${{ steps.check.outputs.should_build }}
      owrt_version: ${{ steps.check.outputs.owrt_version }}
      owrt_ver_safe: ${{ steps.check.outputs.owrt_ver_safe }}
      kernel_version: ${{ steps.check.outputs.kernel_version }}
      nikki_version: ${{ steps.check.outputs.nikki_version }}
    steps:
      - uses: actions/checkout@v7

      - name: 🔍 检测上游版本
        id: check
        run: |
          SAVED=$(cat ${{ env.LAST_VERSION_FILE }} 2>/dev/null || echo "none")

          OWRT_TAG=$(curl -sL "https://api.github.com/repos/${{ env.OWRT_REPO }}/releases/latest" \
            | jq -r '.tag_name // empty')

          NIKKI_TAG=$(curl -sL "https://api.github.com/repos/${{ env.NIKKI_REPO }}/releases/latest" \
            | jq -r '.tag_name // empty')

          KERNEL_VER=$(curl -sL "https://www.kernel.org/releases.json" \
            | jq -r '[.releases[] | select(.moniker == "stable" or .moniker == "longterm") | .version][0] // empty')

          echo "owrt_version=$OWRT_TAG" >> "$GITHUB_OUTPUT"
          echo "kernel_version=$KERNEL_VER" >> "$GITHUB_OUTPUT"
          echo "nikki_version=$NIKKI_TAG" >> "$GITHUB_OUTPUT"

          OWRT_SAFE="${OWRT_TAG#v}"
          echo "owrt_ver_safe=$OWRT_SAFE" >> "$GITHUB_OUTPUT"

          COMPOSITE="${OWRT_TAG}_${NIKKI_TAG}_${KERNEL_VER}"

          if [ "$COMPOSITE" != "$SAVED" ] && [ -n "$OWRT_TAG" ]; then
            echo "should_build=true" >> "$GITHUB_OUTPUT"
            echo "✅ 检测到更新: $COMPOSITE (上次: $SAVED)"
          else
            echo "should_build=false" >> "$GITHUB_OUTPUT"
            echo "⏭️  无更新,跳过构建"
          fi

  # ─── Job 2: 全量 SDK 编译 ──────────────────────────────────────────────
  build:
    needs: check-upstream
    if: needs.check-upstream.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: 📦 安装依赖
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            build-essential libncurses5-dev libncursesw5-dev \
            zlib1g-dev gawk git gettext wget unzip python3 \
            file qemu-utils ccache genisoimage

      - name: 💾 恢复 ccache 缓存
        uses: actions/cache@v5
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ccache-openwrt-${{ needs.check-upstream.outputs.owrt_ver_safe }}-${{ hashFiles('scripts/gen-config.sh') }}
          restore-keys: |
            ccache-openwrt-${{ needs.check-upstream.outputs.owrt_ver_safe }}-
            ccache-openwrt-

      - name: 💾 恢复源码树缓存
        id: source-cache
        uses: actions/cache@v5
        with:
          path: ${{ env.BUILD_DIR }}
          key: source-openwrt-${{ needs.check-upstream.outputs.owrt_ver_safe }}-${{ hashFiles('scripts/gen-config.sh') }}
          restore-keys: |
            source-openwrt-${{ needs.check-upstream.outputs.owrt_ver_safe }}-

      - name: 💾 恢复 dl 缓存
        uses: actions/cache@v5
        with:
          path: |
            ${{ env.BUILD_DIR }}/dl
            ${{ env.BUILD_DIR }}/feeds
          key: dl-openwrt-${{ needs.check-upstream.outputs.owrt_ver_safe }}-${{ hashFiles('scripts/gen-config.sh') }}
          restore-keys: |
            dl-openwrt-${{ needs.check-upstream.outputs.owrt_ver_safe }}-
            dl-openwrt-

      - name: ⬇️ 克隆 OpenWrt 源码
        if: steps.source-cache.outputs.cache-hit != 'true'
        run: |
          TAG="${{ needs.check-upstream.outputs.owrt_version }}"
          rm -rf "${{ env.BUILD_DIR }}"
          git clone --depth 1 --branch "$TAG" \
            https://github.com/${{ env.OWRT_REPO }}.git \
            "${{ env.BUILD_DIR }}"

      - name: ⚙️ 复制自定义文件
        run: |
          cp -r files/* "${{ env.BUILD_DIR }}/files/"

      - name: ⚙️ 配置 feeds（含 nikki）
        run: |
          cp "${{ github.workspace }}/feeds.conf" "${{ env.BUILD_DIR }}/feeds.conf.default"
          cd "${{ env.BUILD_DIR }}"
          # 清理 feeds 中残留的 untracked 文件，避免 git pull 冲突
          rm -rf feeds 2>/dev/null || true
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: ⚙️ 生成 .config
        run: |
          bash scripts/gen-config.sh "${{ env.BUILD_DIR }}"
          cd "${{ env.BUILD_DIR }}"
          make defconfig
          echo "✅ defconfig 完成"

      - name: ⬇️ 下载源码包
        run: |
          cd "${{ env.BUILD_DIR }}"
          make download -j${{ env.MAKE_JOBS }}

      - name: 🏗️ 编译固件
        run: |
          cd "${{ env.BUILD_DIR }}"
          export CCACHE_DIR="${{ env.CCACHE_DIR }}"
          export PATH="/usr/lib/ccache:$PATH"
          make -j${{ env.MAKE_JOBS }} || { echo "⚠️ 编译失败，开启 verbose 重试…"; make -j1 V=s; }

      - name: 🧹 清理中间产物（省磁盘）
        run: |
          du -sh "${{ env.BUILD_DIR }}"
          rm -rf "${{ env.BUILD_DIR }}/build_dir"
          rm -rf "${{ env.BUILD_DIR }}/staging_dir/target-*"
          du -sh "${{ env.BUILD_DIR }}"
          echo "✅ 清理完成"

      - name: 📋 展示编译产物
        run: |
          echo "=== 固件镜像 ==="
          ls -lh "${{ env.BUILD_DIR }}/bin/targets/x86/64/"*.img.gz 2>/dev/null || echo "(无)"
          ls -lh "${{ env.BUILD_DIR }}/bin/targets/x86/64/"*.iso 2>/dev/null || echo "(无)"
          echo ""
          echo "=== IPK 插件包（主题 + 插件 + Nikki）==="
          for dir in luci nikki; do
            COUNT=$(find "${{ env.BUILD_DIR }}/bin/packages/x86_64/$dir" -name "*.ipk" 2>/dev/null | wc -l)
            echo "  $dir/: $COUNT 个 IPK"
            find "${{ env.BUILD_DIR }}/bin/packages/x86_64/$dir" -name "*.ipk" 2>/dev/null | sort
          done
          echo ""
          echo "=== feeds.conf.default ==="
          cat "${{ env.BUILD_DIR }}/feeds.conf.default" 2>/dev/null || echo "(无)"
          echo ""
          echo "=== sha256sums ==="
          cat "${{ env.BUILD_DIR }}/bin/targets/x86/64/sha256sums" 2>/dev/null || echo "(无)"

      - name: 💾 保存版本标识
        run: |
          echo "${{ needs.check-upstream.outputs.owrt_version }}_${{ needs.check-upstream.outputs.nikki_version }}_${{ needs.check-upstream.outputs.kernel_version }}" \
            > "${{ env.LAST_VERSION_FILE }}"

      - name: 📤 上传固件 Artifact
        uses: actions/upload-artifact@v7
        with:
          name: oasisic-openwrt-${{ needs.check-upstream.outputs.owrt_ver_safe }}
          path: |
            ${{ env.BUILD_DIR }}/bin/targets/x86/64/openwrt-x86-64-generic-squashfs-combined-efi.img.gz
            ${{ env.BUILD_DIR }}/bin/targets/x86/64/openwrt-x86-64-generic-squashfs-combined.img.gz
            ${{ env.BUILD_DIR }}/bin/targets/x86/64/openwrt-x86-64-generic-image.iso
            ${{ env.BUILD_DIR }}/bin/targets/x86/64/openwrt-x86-64-generic-image-efi.iso
            ${{ env.BUILD_DIR }}/bin/targets/x86/64/sha256sums
            ${{ env.BUILD_DIR }}/feeds.conf.default
          retention-days: 30

      - name: 📥 下载 Artifact（准备 Release 附件）
        uses: actions/download-artifact@v7
        with:
          name: oasisic-openwrt-${{ needs.check-upstream.outputs.owrt_ver_safe }}
          path: release-artifacts/

      - name: 🏷️ 生成 Release body
        run: |
          cat > release-body.md << 'RELEASEEOF'
          ## 🏝️ Oasisic OpenWrt 自动构建

          | 项 | 值 |
          |----|-----|
          | OpenWrt 版本 | ${{ needs.check-upstream.outputs.owrt_version }} |
          | Nikki 版本 | ${{ needs.check-upstream.outputs.nikki_version }} |
          | Linux 内核 | ${{ needs.check-upstream.outputs.kernel_version }} |
          | 架构 | x86/64, EFI, squashfs |
          | 编译方式 | **全量 SDK**（Nikki 从 feeds 编译） |
          RELEASEEOF
          echo "| 编译时间 | $(TZ='Asia/Shanghai' date '+%Y-%m-%d %H:%M:%S') 北京时间 |" >> release-body.md
          cat >> release-body.md << 'RELEASEEOF'
          | 主机名 | Oasisic OpenWrt |
          | LAN IP | 10.10.10.252/24 | 网关 | 10.10.10.253 |

          ### 📦 预装组件
          - **代理**: Nikki + mihomo-meta ${{ needs.check-upstream.outputs.nikki_version }}
          - **主题**: luci-theme-argon 2.x + argon-config
          - **PVE**: qemu-ga + virtio 全系驱动
          - **升级**: luci-app-attendedsysupgrade
          - **统计**: luci-app-statistics
          - **DNS**: dnsmasq-full (dhcp/dnssec/nftset/dhcpv6)
          - **工具**: bash, curl, wget, yq, htop, iperf3, tcpdump, vim

          ### 📥 下载
          - `squashfs-combined-efi.img.gz` — EFI 启动 (推荐 PVE UEFI)
          - `squashfs-combined.img.gz` — BIOS 启动
          - `image.iso` — ISO 镜像
          - `feeds.conf.default` — 编译源列表
          - `sha256sums` — 固件校验和

          ### 🔑 默认密码
          首次登录后请立即修改密码。详情见 README。
          RELEASEEOF

      - name: 🚀 发布 Release
        uses: softprops/action-gh-release@v3
        if: github.ref == 'refs/heads/main'
        with:
          tag_name: oasisic-${{ needs.check-upstream.outputs.owrt_ver_safe }}
          name: 🏝️ Oasisic OpenWrt ${{ needs.check-upstream.outputs.owrt_ver_safe }}
          fail_on_unmatched_files: false
          make_latest: true
          generate_release_notes: false
          body_path: release-body.md
          files: |
            release-artifacts/bin/targets/x86/64/sha256sums
            release-artifacts/feeds.conf.default
            release-artifacts/bin/targets/x86/64/openwrt-x86-64-generic-squashfs-combined-efi.img.gz
            release-artifacts/bin/targets/x86/64/openwrt-x86-64-generic-squashfs-combined.img.gz
            release-artifacts/bin/targets/x86/64/openwrt-x86-64-generic-image.iso
            release-artifacts/bin/targets/x86/64/openwrt-x86-64-generic-image-efi.iso

      - name: 📢 Discord 通知（🖥️・固件发布）
        if: success()
        env:
          DISCORD_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          OWRT_VER: ${{ needs.check-upstream.outputs.owrt_version }}
          NIKKI_VER: ${{ needs.check-upstream.outputs.nikki_version }}
          KERNEL_VER: ${{ needs.check-upstream.outputs.kernel_version }}
          TAG: oasisic-${{ needs.check-upstream.outputs.owrt_ver_safe }}
          RELEASE_URL: https://github.com/${{ github.repository }}/releases/tag/oasisic-${{ needs.check-upstream.outputs.owrt_ver_safe }}
          BUILD_TIME: $(TZ='Asia/Shanghai' date '+%Y-%m-%d %H:%M:%S')
        run: python3 scripts/notify-discord.py

      - name: 🧹 清理临时文件
        if: always()
        run: |
          rm -f release-body.md
          rm -rf release-artifacts